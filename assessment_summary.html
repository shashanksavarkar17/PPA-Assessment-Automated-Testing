    <!-- Telemetry Processing Javascript -->
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            // Setup general metadata details
            const meta = telemetryData.metadata;
            document.getElementById("meta-name").innerText = meta.name || "BOT";
            document.getElementById("meta-email").innerText = meta.email || "ppa@yopmail.com";
            document.getElementById("meta-total").innerText = meta.total_questions || 0;
            document.getElementById("meta-sections").innerText = meta.total_sections || 0;
            
            const start = new Date(meta.start_time);
            const end = meta.end_time ? new Date(meta.end_time) : new Date();
            const diffSec = Math.round((end - start) / 1000);
            
            document.getElementById("meta-duration").innerText = diffSec + "s";
            document.getElementById("meta-timerange").innerText = `${start.toLocaleTimeString()} - ${end.toLocaleTimeString()}`;
            document.getElementById("header-date").innerText = start.toLocaleDateString(undefined, {month: 'short', day: 'numeric', year: 'numeric'});
            
            // Build metrics rates
            const totalQ = telemetryData.questions.length;
            const passedQ = telemetryData.questions.filter(q => q.status === "PASSED" || q.status === "SUCCESS").length;
            const failedQ = totalQ - passedQ;
            
            document.getElementById("meta-passed").innerText = `${passedQ} Passed`;
            document.getElementById("meta-failed").innerText = `${failedQ} Failed`;
            
            const successRate = totalQ > 0 ? Math.round((passedQ / totalQ) * 100) : 100;
            const rateElem = document.getElementById("meta-rate");
            rateElem.innerText = `${successRate}%`;
            
            // Generate Scanned Structure Listing
            const structContainer = document.getElementById("structure-list");
            structContainer.innerHTML = "";
            
            let sIdx = 1;
            for (const [sectionName, count] of Object.entries(telemetryData.scanned_structure)) {
                const secDiv = document.createElement("div");
                secDiv.className = "flex items-center justify-between p-3 rounded-xl bg-slate-900/40 border border-slate-800/60";
                secDiv.innerHTML = `
                    <div class="flex items-center space-x-3">
                        <span class="w-7 h-7 rounded-lg bg-violet-600/10 text-violet-400 font-bold border border-violet-500/25 flex items-center justify-center text-xs">
                            ${sIdx.toString().padStart(2, '0')}
                        </span>
                        <div class="text-xs font-semibold text-white truncate max-w-[160px]">${sectionName}</div>
                    </div>
                    <span class="px-2 py-0.5 rounded-md bg-slate-800 text-[10px] font-bold text-slate-400 border border-slate-700/60">
                        ${count} Questions
                    </span>
                `;
                structContainer.appendChild(secDiv);
                sIdx++;
            }
            if (sIdx === 1) {
                structContainer.innerHTML = `<p class="text-xs text-slate-500 italic text-center py-2">No scanned sections found.</p>`;
            }
            
            // Generate Timeline events
            const timelineList = document.getElementById("timeline-list");
            timelineList.innerHTML = "";
            telemetryData.timeline.forEach(ev => {
                const evDiv = document.createElement("div");
                evDiv.className = "relative group";
                
                // Pulsing dot logic depending on content
                let dotColor = "bg-slate-700";
                if (ev.event.toLowerCase().includes("fail") || ev.event.toLowerCase().includes("error")) {
                    dotColor = "bg-red-500 ring-4 ring-red-500/10";
                } else if (ev.event.toLowerCase().includes("pass") || ev.event.toLowerCase().includes("solved") || ev.event.toLowerCase().includes("finalized")) {
                    dotColor = "bg-emerald-500 ring-4 ring-emerald-500/10";
                }
                
                evDiv.innerHTML = `
                    <div class="absolute -left-[30px] top-1.5 w-3.5 h-3.5 rounded-full ${dotColor} border border-slate-950 flex items-center justify-center transition-all duration-200"></div>
                    <div class="flex flex-col">
                        <span class="text-[10px] font-bold text-slate-500 group-hover:text-slate-400">${ev.timestamp}</span>
                        <p class="text-xs text-slate-300 font-medium leading-relaxed mt-0.5">${ev.event}</p>
                    </div>
                `;
                timelineList.appendChild(evDiv);
            });
            
            // Initialize Dynamic Tabs and workspace logic
            initWorkspace();
            
            // Refresh lucide icons
            lucide.createIcons();
        });
        
        let activeTabIdx = 0;
        
        function initWorkspace() {
            const tabsContainer = document.getElementById("question-tabs");
            const questions = telemetryData.questions;
            
            if (questions.length === 0) {
                document.getElementById("workspace-content").innerHTML = `
                    <div class="flex flex-col items-center justify-center py-12 text-center">
                        <i data-lucide="help-circle" class="w-12 h-12 text-slate-600 mb-3"></i>
                        <h4 class="text-base font-bold text-slate-400">No telemetry solved questions found.</h4>
                        <p class="text-xs text-slate-500 max-w-sm mt-1">Telemetry will be written dynamically once the solver processes your MCQ or Coding test items.</p>
                    </div>
                `;
                lucide.createIcons();
                return;
            }
            
            // Build Tabs
            tabsContainer.innerHTML = "";
            questions.forEach((q, idx) => {
                const btn = document.createElement("button");
                btn.className = `px-4 py-1.5 text-xs font-bold rounded-md transition duration-200 ${
                    idx === activeTabIdx 
                    ? 'bg-slate-800 text-white shadow-md border border-slate-700/60' 
                    : 'text-slate-400 hover:text-white hover:bg-slate-900/30'
                }`;
                btn.innerText = `Q${q.index}`;
                btn.onclick = () => {
                    activeTabIdx = idx;
                    initWorkspace();
                };
                tabsContainer.appendChild(btn);
            });
            
            renderActiveQuestion(questions[activeTabIdx]);
        }
        
        function renderActiveQuestion(q) {
            const container = document.getElementById("workspace-content");
            container.innerHTML = "";
            
            // Header stats
            let statusBadge = "";
            if (q.status === "PASSED" || q.status === "SUCCESS") {
                statusBadge = `<span class="px-2.5 py-1 text-xs font-bold rounded-full bg-emerald-500/10 text-emerald-400 border border-emerald-500/25 uppercase tracking-wider flex items-center"><i data-lucide="check" class="w-3.5 h-3.5 mr-1"></i>PASSED</span>`;
            } else if (q.status === "FAILED" || q.status === "FAILED_FINAL") {
                statusBadge = `<span class="px-2.5 py-1 text-xs font-bold rounded-full bg-red-500/10 text-red-400 border border-red-500/25 uppercase tracking-wider flex items-center"><i data-lucide="x" class="w-3.5 h-3.5 mr-1"></i>FAILED</span>`;
            } else {
                statusBadge = `<span class="px-2.5 py-1 text-xs font-bold rounded-full bg-yellow-500/10 text-yellow-400 border border-yellow-500/25 uppercase tracking-wider flex items-center"><i data-lucide="alert-circle" class="w-3.5 h-3.5 mr-1"></i>${q.status}</span>`;
            }
            
            const qHeader = document.createElement("div");
            qHeader.className = "flex flex-col md:flex-row md:items-center justify-between pb-6 border-b border-slate-800 mb-6";
            qHeader.innerHTML = `
                <div>
                    <div class="flex items-center space-x-2">
                        <span class="px-2 py-0.5 text-[10px] font-extrabold bg-violet-600/10 text-violet-400 rounded-md border border-violet-500/25 uppercase">${q.type}</span>
                        <h2 class="text-xl font-bold text-white">Question #${q.index} Overview</h2>
                    </div>
                    <p class="text-xs text-slate-400 mt-1">Resolution completed in <span class="font-bold text-white">${q.duration}s</span> using Gemini self-healing engine.</p>
                </div>
                <div class="mt-3 md:mt-0 flex items-center space-x-3">
                    ${statusBadge}
                </div>
            `;
            container.appendChild(qHeader);
            
            // Question Description Box
            const qBody = document.createElement("div");
            qBody.className = "mb-6";
            qBody.innerHTML = `
                <div class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Question Description</div>
                <div class="bg-slate-900/60 border border-slate-800 rounded-xl p-4 text-sm text-slate-300 leading-relaxed max-h-[160px] overflow-y-auto whitespace-pre-line font-medium">
                    ${q.text || "No description details scanned."}
                </div>
            `;
            container.appendChild(qBody);
            
            // Render specific components depending on MCQ or CODING
            if (q.type === "MCQ") {
                renderMCQLayout(q, container);
            } else {
                renderCodingLayout(q, container);
            }
            
            lucide.createIcons();
        }
        
        function renderMCQLayout(q, container) {
            const mcqDiv = document.createElement("div");
            mcqDiv.className = "space-y-6";
            
            // Build options listing
            let optionsHTML = "";
            q.options.forEach((opt, idx) => {
                const isSelected = opt.toLowerCase().trim() === (q.selected_option || "").toLowerCase().trim();
                const optLetter = String.fromCharCode(65 + idx);
                
                let optBorder = "border-slate-800 bg-slate-900/30";
                let optBadge = `<span class="w-6 h-6 rounded-md bg-slate-800 text-slate-500 font-bold border border-slate-700/50 flex items-center justify-center text-xs">${optLetter}</span>`;
                
                if (isSelected) {
                    optBorder = "border-emerald-500/40 bg-emerald-500/5 neon-glow-passed";
                    optBadge = `<span class="w-6 h-6 rounded-md bg-emerald-500/20 text-emerald-400 font-bold border border-emerald-500/30 flex items-center justify-center text-xs">${optLetter}</span>`;
                }
                
                optionsHTML += `
                    <div class="flex items-center justify-between p-4 rounded-xl border ${optBorder} transition duration-200">
                        <div class="flex items-center space-x-3.5">
                            ${optBadge}
                            <span class="text-sm font-semibold text-slate-200 leading-tight">${opt}</span>
                        </div>
                        ${isSelected ? '<i data-lucide="check" class="w-5 h-5 text-emerald-400"></i>' : ''}
                    </div>
                `;
            });
            
            mcqDiv.innerHTML = `
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <div class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2.5">Extracted MCQ Options</div>
                        <div class="space-y-3">
                            ${optionsHTML}
                        </div>
                    </div>
                    <div>
                        <div class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2.5">LLM Resolution Reasoning</div>
                        <div class="bg-slate-900/60 border border-slate-800 rounded-xl p-4 text-xs text-slate-400 leading-relaxed min-h-[160px] max-h-[300px] overflow-y-auto italic whitespace-pre-line font-medium border-l-4 border-l-violet-500">
                            <span class="text-violet-400 font-bold not-italic block mb-1">Gemini Reasoning Path:</span>
                            ${q.reasoning || "Reasoning telemetry not logged."}
                        </div>
                    </div>
                </div>
            `;
            container.appendChild(mcqDiv);
        }
        
        function renderCodingLayout(q, container) {
            const codingDiv = document.createElement("div");
            codingDiv.className = "space-y-6";
            
            // Tab header of attempt lists
            let attemptTabs = "";
            let attemptsSummary = "";
            
            q.attempts.forEach((att, aIdx) => {
                const hasError = att.error ? true : false;
                const statusColor = hasError ? "text-red-400 hover:bg-red-500/10" : "text-emerald-400 hover:bg-emerald-500/10";
                const isFirst = aIdx === 0;
                
                attemptTabs += `
                    <button class="px-3.5 py-1.5 text-xs font-bold rounded-lg border border-slate-800 bg-slate-900/30 transition duration-200 text-slate-400 hover:text-white" onclick="showAttempt(${q.index}, ${aIdx})">
                        Attempt #${att.attempt} ${hasError ? '<span class="inline-block w-1.5 h-1.5 bg-red-500 rounded-full ml-1"></span>' : '<span class="inline-block w-1.5 h-1.5 bg-emerald-500 rounded-full ml-1"></span>'}
                    </button>
                `;
            });
            
            codingDiv.innerHTML = `
                <div class="flex flex-col space-y-4">
                    <div class="flex items-center justify-between border-b border-slate-800 pb-3">
                        <div class="text-xs font-bold text-slate-400 uppercase tracking-wider">Compilation Retries & Edits</div>
                        <div class="flex space-x-2">
                            ${attemptTabs}
                        </div>
                    </div>
                    
                    <div id="coding-workspace-panel" class="grid grid-cols-1 gap-6">
                        <!-- Populated by dynamic attempt selection js -->
                    </div>
                </div>
            `;
            container.appendChild(codingDiv);
            
            // Show the first attempt details by default (or final success if no attempts)
            if (q.attempts.length > 0) {
                showAttempt(q.index, q.attempts.length - 1);
            } else {
                renderEmptyAttempts(q);
            }
        }
        
        function renderEmptyAttempts(q) {
            const panel = document.getElementById("coding-workspace-panel");
            panel.innerHTML = `
                <div class="bg-slate-900/40 border border-slate-800 rounded-2xl p-5">
                    <div class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Final Code Injected (${q.language})</div>
                    <pre class="bg-slate-950 p-4 rounded-xl text-xs font-mono text-emerald-400 overflow-x-auto max-h-[350px] leading-relaxed border border-slate-850">${escapeHTML(q.final_code)}</pre>
                </div>
            `;
        }
        
        function showAttempt(qIdx, attemptIdx) {
            const q = telemetryData.questions.find(item => item.index === qIdx);
            const att = q.attempts[attemptIdx];
            const panel = document.getElementById("coding-workspace-panel");
            
            // Find initial or previous code to compare diff
            // If it's attempt 0, diff compared to final code or previous if exists
            let prevCode = "";
            if (attemptIdx > 0) {
                prevCode = q.attempts[attemptIdx - 1].code;
            } else {
                prevCode = q.attempts[0].code;
            }
            
            const hasError = att.error ? true : false;
            let feedbackPanel = "";
            
            if (hasError) {
                feedbackPanel = `
                    <div class="border border-red-500/25 bg-red-500/5 rounded-2xl p-5 border-l-4 border-l-red-500">
                        <div class="flex items-center justify-between">
                            <span class="text-xs font-bold text-red-400 uppercase tracking-wider flex items-center">
                                <i data-lucide="alert-triangle" class="w-4 h-4 mr-1.5"></i>Compilation / Execution Traceback
                            </span>
                            ${att.screenshot ? `
                                <button class="px-2.5 py-1 text-[10px] font-bold rounded bg-red-500/20 text-red-400 hover:bg-red-500/30 border border-red-500/20 transition flex items-center" onclick="viewScreenshot('${att.screenshot}', 'Q${qIdx} Attempt ${attemptIdx + 1} Failure')">
                                    <i data-lucide="eye" class="w-3.5 h-3.5 mr-1"></i>View Screenshot
                                </button>
                            ` : ''}
                        </div>
                        <pre class="bg-slate-950 p-3 rounded-xl text-[11px] font-mono text-red-300/90 overflow-x-auto mt-3 max-h-[140px] leading-normal border border-slate-850">${escapeHTML(att.error)}</pre>
                    </div>
                `;
            } else {
                feedbackPanel = `
                    <div class="border border-emerald-500/25 bg-emerald-500/5 rounded-2xl p-5 border-l-4 border-l-emerald-500">
                        <span class="text-xs font-bold text-emerald-400 uppercase tracking-wider flex items-center">
                            <i data-lucide="check" class="w-4 h-4 mr-1.5"></i>Successful Verification Code Diff
                        </span>
                        <p class="text-xs text-slate-400 mt-2">Showing modifications between initial attempt and this self-healed, compiling iteration.</p>
                        <div class="mt-3 bg-slate-950 rounded-xl border border-slate-850 p-4 max-h-[220px] overflow-y-auto font-mono text-xs leading-relaxed" id="diff-panel-box">
                            <!-- Populated by dynamic client-side JS Diff -->
                        </div>
                    </div>
                `;
            }
            
            panel.innerHTML = `
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="flex flex-col">
                        <div class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Code Injected (Attempt #${attemptIdx + 1})</div>
                        <pre class="bg-slate-950 p-4 rounded-xl text-[11px] font-mono text-slate-300 overflow-x-auto flex-grow max-h-[350px] leading-relaxed border border-slate-850">${escapeHTML(att.code)}</pre>
                    </div>
                    <div class="space-y-4">
                        <div class="text-xs font-bold text-slate-400 uppercase tracking-wider">Attempt Verdict</div>
                        ${feedbackPanel}
                    </div>
                </div>
            `;
            
            // Build JS Diff if compiled successfully
            if (!hasError) {
                setTimeout(() => {
                    const diffBox = document.getElementById("diff-panel-box");
                    if (diffBox) {
                        diffBox.innerHTML = "";
                        // Perform jsdiff calculation
                        const diffResults = Diff.diffLines(prevCode, att.code);
                        let hasChanges = false;
                        
                        diffResults.forEach(part => {
                            const pre = document.createElement("pre");
                            if (part.added) {
                                hasChanges = true;
                                pre.className = "diff-added px-2 py-0.5 leading-normal my-0.5";
                                pre.innerText = part.value.split('
').map(l => l ? '+ ' + l : '').join('
');
                            } else if (part.removed) {
                                hasChanges = true;
                                pre.className = "diff-removed px-2 py-0.5 leading-normal my-0.5";
                                pre.innerText = part.value.split('
').map(l => l ? '- ' + l : '').join('
');
                            } else {
                                pre.className = "diff-context px-2 py-0.5 leading-normal";
                                pre.innerText = part.value;
                            }
                            diffBox.appendChild(pre);
                        });
                        
                        if (!hasChanges) {
                            diffBox.innerHTML = `<p class="text-xs text-slate-500 italic text-center py-4">No code changes logged compared to the previous attempt.</p>`;
                        }
                    }
                }, 50);
            }
            
            lucide.createIcons();
        }
        
        function escapeHTML(str) {
            if (!str) return "";
            return str
                 .replace(/&/g, "&amp;")
                 .replace(/</g, "&lt;")
                 .replace(/>/g, "&gt;")
                 .replace(/"/g, "&quot;")
                 .replace(/'/g, "&#039;");
        }
        
        function viewScreenshot(src, caption) {
            document.getElementById("modal-img").src = src;
            document.getElementById("modal-caption").innerText = caption;
            document.getElementById("screenshot-modal").classList.remove("hidden");
        }
        
        function closeModal() {
            document.getElementById("screenshot-modal").classList.add("hidden");
        }
    </script>
</body>
</html>
